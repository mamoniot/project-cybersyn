[virtual-signal-name]
cybersyn-priority=車站優先級
cybersyn-request-threshold=請求閾值
cybersyn-fluid-request-threshold=流體請求閾值
cybersyn-locked-slots=每貨運車廂鎖定格數
cybersyn-reserved-fluid-capacity=每流體車廂保留容量

[virtual-signal-description]
cybersyn-priority=數值較高的車站會比數值較低的車站優先獲得服務。數值可以為負。預設優先級為零，可在地圖設定中變更。
cybersyn-request-threshold=設定一個閾值，當此車站請求的物品超過該值時即觸發運送。影響未自行定義閾值的物品。若車站使用[font=default-bold]堆疊閾值[/font]選項，此值會自動換算為各受影響物品的堆疊數。對於沒有此信號的車站另有地圖設定可用。\n\n[color=yellow]若沒有任何列車的容量達到此閾值，受該閾值影響的運送將無法完成。[/color]
cybersyn-fluid-request-threshold=設定一個閾值，當此車站請求的流體超過該值時即觸發運送。影響未自行定義閾值的流體。對於沒有此信號的車站另有地圖設定可用。\n\n[color=yellow]若沒有任何列車的容量達到此閾值，受該閾值影響的運送將無法完成。[/color]
cybersyn-locked-slots=保留每節貨運車廂指定數量的空格。這在不精確裝載時很有用，可確保多餘的物品仍能轉入車廂。\n不影響閾值，但可能減少實際的裝載清單。
cybersyn-reserved-fluid-capacity=保留每節流體車廂指定的空容量。這在不精確抽取時很有用，可確保管道中多餘的流體仍能轉入車廂。\n不影響閾值，但可能減少實際的裝載清單。

[cybersyn-messages]
nonempty-train=因仍有貨物，一輛列車被扣留在車庫中
unexpected-train=一輛列車在完成運送前意外返回了車庫
stuck-train=一輛列車卡住了
cannot-path-between-surfaces=一輛列車正試圖在兩個未相連的表面之間運送，或許應將它們置於不同的網路上
depot-broken=一輛列車因其車庫遭破壞而迷航
refueler-broken=一輛列車因其加油站遭破壞而迷航
station-broken=一輛列車因其其中一個運送車站遭破壞而迷航
train-lost-in-teleport=一輛列車在升降梯傳送過程中遺失（某個車廂原型可能已被移除）
train-at-incorrect=一輛列車停在了並非其運送排程的車站
missing-train=在正確的網路上找不到任何可從 __2__ 運送至 __1__ 的列車
no-train-has-capacity=找不到具有足夠貨物容量、可從 __2__ 運送至 __1__ 的列車
no-train-matches-r-layout=在 __1__ 的允許清單中找不到可進行運送的列車
no-train-matches-p-layout=在 __2__ 的允許清單中找不到可運送至 __1__ 的列車
station-non-default-priority=列車因此車站的 Factorio 原生優先級而被誤導。在 Project Cybersyn 中使用非預設的 Factorio 原生優先級「將」導致錯誤的運送。您可以使用 /cybersyn-fix-priorities 修正有問題的車站。
fix-priorities-command-help=將有問題的火車站優先級重設回 50
find-problems-command-help=找出在 Cybersyn 網路中造成問題的火車站
recalculate-train-size-command-help=重新計算所有列車的車廂容量
abolish-same-depot-command-help=移除所有車庫與列車的「需要相同車庫」設定，並確保所有車庫都有列車數量上限。[color=yellow]請先儲存您的遊戲。[/color]
abolish-same-depot-command-result=已調整 __1__ 個車庫與 __2__ 輛列車。技術細節請參閱 factorio-current.log。
control-train-group=列車群組 __1__ 現由 Cybersyn 用於車庫 __2__。請[color=yellow]勿[/color]修改該群組的基礎排程。
train-group-schedule-broken=列車群組 __1__ 的基礎排程為空。列車在完成運送後將無處可去。
train-schedule-broken=一輛列車在完成運送後將無處可去。
elevator-connected=已將升降梯 __1__ 連接至 Cybersyn
elevator-disconnected=已將升降梯 __1__ 自 Cybersyn 中斷連接
other-elevator-enabled=[img=virtual-signal/se-warning] 由於升降梯 __1__ 仍處於連接狀態，列車仍會使用它。[color=cyan]請為各升降梯指定不同的名稱以避免此情況。[/color]
other-elevator-disabled=[img=virtual-signal/se-warning] 即使升降梯 __1__ 已中斷連接，列車仍會使用它。[color=cyan]請為各升降梯指定不同的名稱以避免此情況。[/color]

[cybersyn-problems]
no-problems-found=[img=item/construction-robot] 機器人已對您所有的 Cybersyn 車站完成檢查清單，沒有任何需要回報的問題 [img=virtual-signal/signal-check]。
double-station=擁有超過一個處於車站模式的 Cybersyn 運算器。
double-station-control=擁有超過一個處於車站控制模式的 Cybersyn 運算器。
double-depot=擁有超過一個處於車庫模式的 Cybersyn 運算器。
double-refueler=擁有超過一個處於加油站模式的 Cybersyn 運算器。
station-and-depot=不能同時是請求站／供應站與車庫。
station-and-refueler=不能同時是請求站／供應站與加油站。
depot-and-refueler=不能同時是車庫與加油站。
non-default-priority=使用的優先級會誤導由 Cybersyn 控制的列車。請重設為 50，並在適當時改用 Cybersyn 的 [virtual-signal=cybersyn-priority]。
priority-was-reset=已重設為優先級 50。
name-overlap-with-depot=與某個 Cybersyn 車庫同名。這會導致幽靈運送，因為從前一次運送抵達此處的列車不會重設其運送排程。
name-overlap-with-refueler=與某個 Cybersyn 加油站同名。
derelict-combinator=距離火車站不夠近。

[cybersyn-gui]
combinator-title=協同控制運算器
operation=模式
comb1=車站
depot=車庫
refueler=加油站
comb2=車站控制
wagon-manifest=車廂控制
switch-provide=僅供應
switch-request=僅請求
switch-provide-tooltip=鎖定此車站，使其僅向網路供應物品。預設情況下它同時請求與供應。
switch-request-tooltip=鎖定此車站，使其僅向網路請求物品。預設情況下它同時請求與供應。
network=網路
network-tooltip=以一個信號來識別此運算器屬於哪個網路。只有當車庫、供應站與請求站都以相同的信號識別時，列車才會從車庫派遣至這些站。
allow-list-description=自動允許清單
allow-list-tooltip=正常情況下，當請求運送時，任何貨物容量足夠的列車都可滿足需求。勾選此設定後，列車還必須在此車站的「允許清單」中。若列車的每節車廂都能由此車站沿線的機械臂或泵裝卸，該列車就會自動加入允許清單。
allow-list-refresh-description=重新整理允許清單
allow-list-refresh-tooltip=允許清單是在放置運算器時，根據其周圍的實體所定義。由於這是耗費資源的運算，平時很少在此事件以外執行。此按鈕會讓此運算器立即重新計算其允許清單。
allow-list-preview=允許清單
allow-list-preview-tooltip=這是描述哪些列車可以停靠此車站的清單。\n[img=item/locomotive] = 火車頭\n[img=item/cargo-wagon] = 物品\n[img=item/fluid-wagon] = 流體\n[img=cybersyn-both-wagon] = 兩者\n[img=utility/rail_path_not_possible] = 缺少車站\n[img=entity/entity-ghost] = 運算器為幽靈
allow-list-no-station=未連結至火車站
is-stack-description=堆疊閾值
is-stack-tooltip=勾選後，此車站的所有請求閾值都會被解讀為物品堆疊數，而非物品總數。流體的閾值不受影響。
enable-inactive-description=靜止狀態條件
enable-inactive-tooltip=勾選後，此車站的列車除了要完成其運送訂單外，還必須等待靜止狀態。這在列車離開前須完成某些工作時很有用，例如讓機械臂清空手中的物品。
use-same-depot-description=需要相同車庫
use-same-depot-tooltip=勾選後，來自此車庫的列車總是返回此車庫。未勾選時，則允許列車返回任何與此車庫同名的車庫。\n\n[color=yellow]與應在返回車庫前發生的中斷指令不相容。[/color]
depot-bypass-description=車庫繞行
depot-bypass-tooltip=勾選後，來自此車庫的列車不必停在此車庫即可接受新訂單，只要目前沒有進行中的有效訂單即可。若燃料不足且沒有可用的加油站，它們仍會返回此車庫。
enable-slot-barring-description=封鎖未篩選格數
enable-slot-barring-tooltip=勾選後，相鄰車廂中任何未經篩選的格數都會被封鎖，使其無法裝入任何物品。
enable-circuit-condition-description=電路條件
enable-circuit-condition-tooltip=勾選後，列車離開此車站前須滿足電路條件 [virtual-signal=signal-check]>0。此信號必須送至火車站，且火車站須設定為向列車發送信號。當列車離開前須完成靜止狀態條件無法處理的進階工作時，這很有用。
enable-train-count-description=啟用列車計數
enable-train-count-tooltip=勾選後，車站控制運算器的輸出中會包含 [virtual-signal=signal-T] 信號。其數值為往返此車站、具有運送任務的列車數量。
enable-manual-inventory-description=手動庫存控制
enable-manual-inventory-tooltip=[color=yellow]進階功能[/color]，在管理多個共用庫存的車站時很有用。停用時，Cybersyn 會自動調整車站庫存以計入即將到站的列車。啟用時，則須將此車站控制運算器的輸出加入貨物信號，手動進行此調整。
disable-manifest-description=無裝載清單
disable-manifest-tooltip=勾選後，列車不必完成其裝載清單即可離開。例如，當請求的貨物可能因腐壞而不再可用時，這很有用。\n\n[color=cyan]至少需啟用另一項等待條件。[/color]
dispatcher-disabled=調度器已停用
dispatcher-disabled-description=中央調度演算法已停用。在地圖設定中重新啟用之前，不會派遣任何新列車。
