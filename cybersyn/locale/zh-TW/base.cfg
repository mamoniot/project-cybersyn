[mod-setting-description]
cybersyn-enable-planner=啟用或停用中央調度演算法。若停用，則不會派遣新列車。
cybersyn-ticks-per-second=中央調度每秒應更新網路狀態並安排運送的次數。此值將向上取整為 60 的除數。設為 0 將停止所有派遣。
cybersyn-update-rate=每 tick 可同時輪詢或同時安排運送的車站數量。數值越大，中央調度越能即時掌握網路目前的狀態，但會犧牲效能。
cybersyn-request-threshold=當車站未收到請求閾值信號時的預設請求閾值。當車站收到一個負的物品信號並超過其請求閾值時，只要存在任何一個信號大於請求閾值的正信號車站，就會在這兩個車站間安排該物品的運送。
cybersyn-fluid-request-threshold=當車站未收到流體請求閾值信號時，針對流體的預設請求閾值。會取代流體的請求閾值。設為 0 可停用。
cybersyn-priority=當車站、車庫或加油站未收到優先級信號時的預設優先級。優先級較高的車站會比優先級較低的車站優先收到運送。
cybersyn-locked-slots=當供應站未收到「每貨運車廂鎖定格數」信號時的預設鎖定格數。當供應站的每貨運車廂鎖定格數為 X 時，任何試圖從該站運送物品的列車都會修改其指令，使每節貨運車廂至少保留 X 個空格。這對於使多物品供應站正確運作是必要的。
cybersyn-reserved-fluid-capacity=當車站未收到對應信號時，每流體車廂的預設保留容量。當車站保留流體容量時，任何試圖從該站運送的列車都會修改其指令，使每節流體車廂至少保留設定的空容量。這對於可能因管道連接而造成的不精確裝載是必要的。
cybersyn-network-flag=當車站未收到網路信號時，該車站預設服務的子網路集合。此整數會以位元方式解讀，提供 32 個可供選擇的子網路。
cybersyn-fuel-threshold=列車的燃料庫存必須達到多少百分比才能跳過加油。若設為 1，列車將總是在完成運送後前往加油站。
cybersyn-depot-bypass-enabled=若勾選，當列車完成運送與加油後，可在返回車庫之前先從網路接受新訂單。
cybersyn-warmup-time=協同控制運算器在連接到 Cybersyn 網路之前要等待多少秒。這是一段寬限期，讓您在列車開始派遣到新藍圖車站之前修改或修正電路網路。
cybersyn-stuck-train-time=自列車派遣起經過這麼多秒後，會發送警報通知您列車可能卡住且尚未完成運送。玩家可能需要偵錯其網路才能使列車脫困。
cybersyn-track-request-wait-times=若勾選，會追蹤各車站等待請求物品的時間，並在 Cybersyn 管理器介面中顯示此資訊。在非常大型的基地中可能影響效能。預設停用。
cybersyn-enable-analytics=若勾選，啟用列車使用率與運送分析。會在 Cybersyn 管理器中加入「使用率」與「明細」分頁。在非常大型的基地中可能影響效能。預設停用。
cybersyn-allow-cargo-in-depot=若勾選，允許列車在車庫中存放貨物；不會產生任何警報，列車也不會被扣留。此外，訂單為前往並勾選了「靜止狀態條件」之請求站的列車，將等待靜止狀態而非等待清空貨物。這對於建立由車庫處理多餘貨物的列車系統很有用。僅適合進階使用者。
cybersyn-manager-updates-per-second=控制 Cybersyn 管理器介面的重新整理頻率。必須將 Cybersyn 管理器設為啟用，此設定才會生效。
cybersyn-manager-result-limit=限制相符實體（如車站、列車）的數量，以限制重新整理清單時消耗的更新時間。\n-1 表示傳回所有結果。

