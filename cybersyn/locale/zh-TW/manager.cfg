[mod-name]
cybersyn=Project Cybersyn

[mod-description]
cybersyn=[color=green]Project Cybersyn — 物流列車調度器[/color]\n透過協同控制運算器建立功能豐富的列車物流網路。有了本模組，您就能協調整個大型基地的整體投入與產出。

